; =============================================================================
; PlatformIO Configuration - ESP32 Health Monitor Mesh
; =============================================================================
; Tiga environment untuk tiga node yang berbeda role-nya.
; Upload ke node yang sesuai dengan perintah:
;   pio run -e node_sensor_a -t upload
;   pio run -e node_sensor_b -t upload
;   pio run -e node_gateway   -t upload
; =============================================================================

[env]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; Library yang dipakai semua node
lib_deps =
    ; MPU6050 — TIDAK menggunakan library (sensor KW tidak kompatibel).
    ;            Implementasi manual via raw I2C register ada di Sensor_MPU.cpp.
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.1.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS=1

; --------------------------------------------------------------------------- ;
; Node A — hanya sensor + kirim via ESP-NOW                                   ;
; --------------------------------------------------------------------------- ;
[env:node_sensor_a]
build_flags =
    ${env.build_flags}
    -DNODE_ROLE=ROLE_SENSOR
    -DNODE_ID=1

; --------------------------------------------------------------------------- ;
; Node B — hanya sensor + kirim via ESP-NOW                                   ;
; --------------------------------------------------------------------------- ;
[env:node_sensor_b]
build_flags =
    ${env.build_flags}
    -DNODE_ROLE=ROLE_SENSOR
    -DNODE_ID=2

; --------------------------------------------------------------------------- ;
; Node C — terima ESP-NOW dari A & B, forward ke MQTT via WiFi                ;
; --------------------------------------------------------------------------- ;
[env:node_gateway]
build_flags =
    ${env.build_flags}
    -DNODE_ROLE=ROLE_GATEWAY
    -DNODE_ID=3